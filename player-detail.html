<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选手档案 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body data-page="players">

<div id="app-header"></div>

<div class="detail-hero" id="detailHero">
  <div class="container">
    <a href="players.html" class="back">← 返回选手列表</a>
    <div class="detail-header">
      <div class="detail-avatar" id="detailAvatar"></div>
      <div class="detail-meta">
        <h1 id="detailName"></h1>
        <div class="sub" id="detailSub"></div>
        <div class="tags" id="detailTags"></div>
      </div>
    </div>
  </div>
</div>

<div class="detail-body">
  <div class="detail-main">
    <div class="info-card">
      <h2>📖 角色简介</h2>
      <div class="bio-text" id="detailBio"></div>
    </div>
    <div class="info-card">
      <h2>📅 赛季经历</h2>
      <div class="career-timeline" id="detailCareer"></div>
    </div>
    <div class="info-card" id="honorsCard" style="display:none;">
      <h2>🏆 荣誉</h2>
      <div id="detailHonors"></div>
    </div>
  </div>
  <div class="detail-side">
    <div class="info-card">
      <h2>📋 基本信息</h2>
      <div id="detailInfo"></div>
    </div>
    <div class="info-card" id="relationsCard" style="display:none;">
      <h2>👥 人际关系</h2>
      <div id="detailRelations"></div>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="players.js?v=2"></script>
<script src="page-player-detail.js"></script>
</body>
</html>
