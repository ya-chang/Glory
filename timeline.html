<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荣耀时间线 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<style>
/* ===== 时间线专属样式 ===== */
.timeline-hero {
  padding: 48px 0 32px;
  text-align: center;
  background: linear-gradient(180deg, rgba(200,160,48,0.08) 0%, transparent 100%);
}
.timeline-hero h1 {
  font-size: 2rem;
  color: var(--gold-mid, #c8a030);
  font-family: 'Noto Serif SC', serif;
  margin-bottom: 8px;
}
.timeline-hero p {
  color: rgba(255,255,255,0.5);
  font-size: 0.95rem;
}

/* 赛季导航 */
.season-nav {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 16px 0 24px;
  flex-wrap: wrap;
}
.season-nav .sn-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(200,160,48,0.25);
  background: rgba(200,160,48,0.06);
  color: rgba(255,255,255,0.7);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  font-family: inherit;
}
.season-nav .sn-btn:hover,
.season-nav .sn-btn.active {
  background: rgba(200,160,48,0.2);
  color: #c8a030;
  border-color: rgba(200,160,48,0.5);
}
.season-nav .sn-btn.champion {
  background: rgba(200,160,48,0.15);
  border-color: rgba(200,160,48,0.4);
  color: #c8a030;
  font-weight: 700;
}

/* 时间线主体 */
.timeline-body {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* 赛季卡片 */
.season-card {
  position: relative;
  margin-bottom: 40px;
  padding-left: 36px;
}
.season-card::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 0;
  bottom: -40px;
  width: 2px;
  background: linear-gradient(180deg, rgba(200,160,48,0.4) 0%, rgba(200,160,48,0.08) 100%);
}
.season-card:last-child::before {
  bottom: 0;
}

/* 节点 */
.season-dot {
  position: absolute;
  left: 4px;
  top: 6px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(200,160,48,0.15);
  border: 2px solid rgba(200,160,48,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: #c8a030;
  font-weight: 700;
  z-index: 1;
}
.season-card.champion .season-dot {
  background: rgba(200,160,48,0.3);
  border-color: #c8a030;
  box-shadow: 0 0 12px rgba(200,160,48,0.3);
}

/* 卡片内容 */
.season-content {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 20px 24px;
  transition: border-color 0.2s;
}
.season-card.champion .season-content {
  border-color: rgba(200,160,48,0.2);
  background: rgba(200,160,48,0.04);
}
.season-content:hover {
  border-color: rgba(200,160,48,0.15);
}

.season-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.season-label {
  font-size: 1.3rem;
  font-weight: 900;
  color: #c8a030;
  font-family: 'Noto Serif SC', serif;
}
.season-champion {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  background: rgba(200,160,48,0.12);
  color: #c8a030;
  font-weight: 700;
  font-size: 0.95rem;
}
.season-champion .trophy { font-size: 1rem; }

.season-events {
  list-style: none;
  padding: 0;
}
.season-events li {
  position: relative;
  padding: 6px 0 6px 18px;
  color: rgba(255,255,255,0.75);
  font-size: 0.9rem;
  line-height: 1.6;
}
.season-events li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: rgba(200,160,48,0.5);
}
.season-events li.highlight {
  color: #e8c860;
  font-weight: 600;
}
.season-events li.highlight::before {
  content: '★';
  color: #c8a030;
}

/* 核心剧情 */
.story-section {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.story-section h2 {
  font-size: 1.4rem;
  color: #c8a030;
  font-family: 'Noto Serif SC', serif;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(200,160,48,0.15);
}
.story-block {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
}
.story-block h3 {
  color: rgba(255,255,255,0.9);
  font-size: 1.05rem;
  margin-bottom: 10px;
}
.story-block p {
  color: rgba(255,255,255,0.6);
  font-size: 0.9rem;
  line-height: 1.7;
  margin-bottom: 8px;
}
.story-block p:last-child { margin-bottom: 0; }

/* 关系图 */
.relation-graph {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.relation-graph h2 {
  font-size: 1.4rem;
  color: #c8a030;
  font-family: 'Noto Serif SC', serif;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(200,160,48,0.15);
}
.relation-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.rel-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.7);
}
.rel-item .rel-name {
  color: #c8a030;
  font-weight: 700;
  min-width: 36px;
}
.rel-item .rel-arrow {
  color: rgba(200,160,48,0.5);
  font-size: 0.8rem;
}
.rel-item .rel-desc {
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body data-page="timeline">

<div id="app-header"></div>

<div class="timeline-hero">
  <h1>🏆 荣耀时间线</h1>
  <p>荣耀职业联赛 · 十个赛季的传奇</p>
</div>

<div class="season-nav" id="seasonNav"></div>

<div class="timeline-body" id="timelineBody"></div>

<div class="story-section">
  <h2>📖 小说主线剧情</h2>
  <div id="storyContent"></div>
</div>

<div class="relation-graph">
  <h2>🔗 角色关系</h2>
  <div class="relation-list" id="relationList"></div>
</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="page-timeline.js"></script>

</body>
</html>
