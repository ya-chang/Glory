<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帖子详情 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="帖子详情 · 荣耀社区">
<meta property="og:description" content="荣耀社区讨论区帖子详情">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:type" content="article">
</head>
<body data-page="forum">

<div id="app-header"></div>

<div class="container" style="padding-top:20px;padding-bottom:48px;max-width:860px;">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="postSection"></div>
  <div id="replySection"></div>
  <div id="notFound" style="display:none;">
    <div class="empty-state">
      <div style="font-size:48px;margin-bottom:16px;">😢</div>
      <p>未找到该帖子</p>
      <a href="forum-home.html" class="btn btn-primary">返回讨论区</a>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="forum.js?v=2"></script>
<script src="page-post-detail.js"></script>

<style>
  .post-author-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .post-author-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-5), var(--green-5));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    color: var(--blue-2);
    border: 2px solid var(--border);
  }
  .post-author-meta {
    display: flex; align-items: center; gap: 8px;
  }
  .post-time-row {
    display: flex; gap: 16px;
    font-size: 12px; color: var(--text-3);
  }

  .post-action-btn.favorited {
    background: #fff8e1;
    border-color: #ffcc80;
    color: #e65100;
  }
  .post-action-delete {
    color: #c62828 !important;
    margin-left: auto;
  }
  .post-action-delete:hover {
    background: #ffebee;
    border-color: #ef9a9a;
  }

  .reply-section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .reply-section-header h2 {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }

  .reply-floor {
    font-size: 11px; color: var(--text-3);
    margin-left: auto;
    font-weight: 500;
  }
  .reply-time {
    font-size: 12px; color: var(--text-3);
  }

  .mention-user {
    color: var(--blue-3);
    font-weight: 600;
  }

  .reply-children {
    margin-top: 12px;
    padding-left: 0;
    border-left: 3px solid var(--blue-5);
    margin-left: 0;
  }
  .reply-child {
    display: flex; gap: 10px;
    padding: 12px 0 12px 12px;
    border-bottom: 1px solid #f8f8f8;
  }
  .reply-child:last-child { border-bottom: none; }
  .reply-child-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green-5);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: var(--green-2);
    flex-shrink: 0;
  }
  .reply-child-body { flex: 1; min-width: 0; }

  .reply-empty {
    text-align: center;
    padding: 32px 0;
    color: var(--text-3);
  }
  .reply-empty p { font-size: 14px; }

  .reply-form-wrap {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .reply-form-header {
    font-size: 14px; font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .reply-form-hint {
    font-size: 12px; color: var(--text-3);
    margin-top: 8px;
  }

  .toast-msg {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8);
    color: var(--white);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast-msg.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .reply-action.liked {
    color: var(--blue-3) !important;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .post-detail-card { padding: 16px 12px; }
    .post-detail-title { font-size: 17px; line-height: 1.4; }
    .post-author-avatar { width: 36px; height: 36px; font-size: 15px; }
    .post-time-row { flex-direction: column; gap: 4px; }
    .post-detail-actions { flex-wrap: wrap; gap: 6px; }
    .post-action-btn { padding: 6px 10px; font-size: 12px; }
    .reply-item { padding: 12px 0; }
    .reply-avatar { width: 30px; height: 30px; font-size: 12px; }
    .reply-child { padding-left: 6px; }
    .reply-child-avatar { width: 24px; height: 24px; font-size: 10px; }
    .reply-actions { gap: 8px; }
    .reply-action { padding: 4px 8px; font-size: 12px; }
    .comment-form textarea { min-height: 80px; font-size: 14px; }
    .breadcrumb { font-size: 12px; }
  }
  @media (max-width: 480px) {
    .post-detail-card { padding: 14px 10px; }
    .post-detail-title { font-size: 15px; }
    .post-detail-content { font-size: 14px; }
    .reply-header { flex-wrap: wrap; gap: 4px; }
    .reply-text { font-size: 13px; }
    .reply-children { margin-left: 0; }
  }
</style>
</body>
</html>
