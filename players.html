<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选手百科 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="选手百科 · 荣耀社区">
<meta property="og:description" content="收录荣耀职业联盟全部战队选手资料，支持赛季切换。">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:url" content="https://ya-chang.github.io/glory/players.html">
<meta property="og:type" content="website">
</head>
<body data-page="players">

<div id="app-header"></div>

<div class="page-header">
  <div class="container">
    <h1>👤 选手百科</h1>
    <p>荣耀职业联盟全部战队选手资料 · 支持按战队筛选</p>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-inner">
    <div class="filter-search">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索选手姓名、游戏ID..." oninput="filterPlayers()">
    </div>
    <select class="filter-select" id="statusFilter" onchange="filterPlayers()">
      <option value="all">全部状态</option>
      <option value="现役">现役</option>
      <option value="退役">退役</option>
      <option value="转会">转会</option>
    </select>
  </div>
</div>

<div class="container">
  <div class="team-tabs" id="teamTabs"></div>
  <div class="players-grid" id="playersGrid"></div>
  <div id="emptyState" style="display:none;text-align:center;padding:60px 0;color:var(--text-3);">
    <div style="font-size:48px;margin-bottom:16px;">🔍</div>
    <p style="font-size:15px;">没有找到匹配的选手</p>
  </div>
</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="players.js?v=2"></script>
<script src="page-players.js"></script>
</body>
</html>
