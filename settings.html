<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body data-page="settings">

<div id="app-header"></div>

<div class="page-header">
  <div class="container">
    <h1>⚙️ 设置</h1>
    <p>管理你的账号和个人资料</p>
  </div>
</div>

<div class="container" style="max-width:720px;padding-top:24px;padding-bottom:48px;">

  <!-- 个人资料 -->
  <div class="settings-card">
    <h2>👤 个人资料</h2>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="s_name" placeholder="你的昵称" maxlength="20">
      <div class="hint">2-20 个字符</div>
    </div>
    <div class="form-group">
      <label>头像</label>
      <div class="file-upload">
        <input type="file" id="s_avatar" accept="image/*" onchange="previewAvatar(this)">
        <label for="s_avatar">选择图片</label>
        <div class="file-preview" id="avatarPreview"><img></div>
        <span style="font-size:12px;color:var(--text-3);">支持 jpg/png，建议 200x200</span>
      </div>
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea id="s_bio" placeholder="介绍一下自己..." rows="3" maxlength="200"></textarea>
      <div class="hint">最多 200 字</div>
    </div>
    <div class="form-group">
      <label>最喜欢的角色</label>
      <select id="s_favPlayer">
        <option value="">选择角色（可选）</option>
      </select>
    </div>
    <div class="form-group">
      <label>最喜欢的支持战队</label>
      <select id="s_favTeam">
        <option value="">选择战队（可选）</option>
      </select>
    </div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" onclick="saveProfile()">💾 保存修改</button>
    </div>
  </div>

  <!-- 账号安全 -->
  <div class="settings-card">
    <h2>🔒 账号安全</h2>
    <div class="form-group">
      <label>当前密码</label>
      <input type="password" id="s_currentPassword" placeholder="修改密码时需要输入当前密码">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="s_newPassword" placeholder="新密码（留空则不修改）">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="s_confirmPassword" placeholder="再次输入新密码">
    </div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" onclick="savePassword()">🔒 修改密码</button>
    </div>
  </div>

  <!-- 返回 -->
  <div style="text-align:center;margin-top:20px;">
    <a href="profile.html" class="btn btn-secondary">← 返回个人主页</a>
  </div>

</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="players.js?v=2"></script>
<script src="page-settings.js"></script>

<style>
  .settings-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .settings-card h2 {
    font-size: 17px; font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .toast-msg {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8); color: var(--white);
    padding: 10px 24px; border-radius: 8px;
    font-size: 14px; z-index: 1000; opacity: 0;
    transition: all 0.3s ease; pointer-events: none;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Mobile */
  @media (max-width: 768px) {
    .settings-card { padding: 18px 14px; }
    .settings-card h2 { font-size: 15px; margin-bottom: 14px; }
    .form-group label { font-size: 13px; }
    .form-group input, .form-group textarea, .form-group select {
      font-size: 15px; padding: 12px; width: 100%;
    }
    .form-group textarea { min-height: 80px; }
    .file-upload label { padding: 10px 20px; font-size: 13px; }
    .btn-row .btn { width: 100%; padding: 12px; font-size: 14px; }
    .file-preview img { max-width: 120px; max-height: 120px; }
  }
  @media (max-width: 480px) {
    .settings-card { padding: 14px 12px; }
    .file-preview { margin: 8px 0; }
  }
</style>
</body>
</html>
