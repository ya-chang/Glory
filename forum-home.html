<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讨论区 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="讨论区 · 荣耀社区">
<meta property="og:description" content="原作讨论、同人创作、灌水闲聊，关于荣耀的一切都可以在这里聊。">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:url" content="https://ya-chang.github.io/glory/forum-home.html">
<meta property="og:type" content="website">
</head>
<body data-page="forum">

<div id="app-header"></div>

<div class="page-header">
  <div class="container">
    <h1>💬 讨论区</h1>
    <p>关于荣耀的一切都可以在这里聊</p>
  </div>
</div>

<div class="container">
  <!-- 统计卡片 -->
  <div class="forum-stats-bar">
    <div class="forum-stat-card">
      <div class="forum-stat-icon">📝</div>
      <div class="forum-stat-body">
        <div class="forum-stat-num" id="totalPosts">-</div>
        <div class="forum-stat-label">帖子</div>
      </div>
    </div>
    <div class="forum-stat-card">
      <div class="forum-stat-icon">💬</div>
      <div class="forum-stat-body">
        <div class="forum-stat-num" id="totalReplies">-</div>
        <div class="forum-stat-label">回复</div>
      </div>
    </div>
    <div class="forum-stat-card">
      <div class="forum-stat-icon">🔥</div>
      <div class="forum-stat-body">
        <div class="forum-stat-num" id="todayPosts">-</div>
        <div class="forum-stat-label">今日新帖</div>
      </div>
    </div>
    <div class="forum-stat-card">
      <div class="forum-stat-icon">👀</div>
      <div class="forum-stat-body">
        <div class="forum-stat-num" id="totalViews">-</div>
        <div class="forum-stat-label">总浏览</div>
      </div>
    </div>
  </div>

  <!-- 版块列表 -->
  <div class="section-title"><span class="dot"></span> 版块</div>
  <div class="forum-categories" id="categoriesGrid"></div>

  <!-- 热门帖子 -->
  <div class="forum-section">
    <div class="section-title"><span class="dot"></span> 🔥 热门帖子</div>
    <div id="hotPosts"><p style="color:var(--text-3);padding:20px 0;">加载中...</p></div>
  </div>

  <!-- 最近活跃帖子 -->
  <div class="forum-section">
    <div class="section-title"><span class="dot"></span> 最近活跃</div>
    <div id="recentPosts"><p style="color:var(--text-3);padding:20px 0;">加载中...</p></div>
  </div>
</div>

<a href="post-new.html" class="btn-new-post" title="发新帖">+</a>
<a href="post-new.html?cat=meta&announce=1" class="btn-new-post btn-announce" id="announceBtn" title="发布公告" style="display:none;bottom:90px;background:linear-gradient(135deg,#6a1b9a,#8e24aa);">📢</a>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="forum.js?v=2"></script>
<script src="page-forum-home.js"></script>

<style>
  .forum-stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 24px 0 8px;
  }
  .forum-stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: all var(--transition);
  }
  .forum-stat-card:hover {
    border-color: var(--blue-4);
    box-shadow: var(--shadow);
  }
  .forum-stat-icon {
    font-size: 28px;
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--blue-5);
    display: flex; align-items: center; justify-content: center;
  }
  .forum-stat-num {
    font-size: 24px; font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .forum-stat-label {
    font-size: 12px; color: var(--text-3);
    margin-top: 2px;
  }

  .cat-card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .cat-card-icon {
    font-size: 28px;
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--blue-5);
    display: flex; align-items: center; justify-content: center;
  }
  .cat-last-post {
    margin-top: 10px;
    font-size: 12px; color: var(--text-3);
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .forum-section {
    margin-bottom: 16px;
  }

  .hot-post {
    border-left: 3px solid #ff6d00;
  }
  .hot-post .post-avatar.hot {
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    color: #e65100;
    border-color: #ffcc80;
  }
  .post-meta .stat.highlight {
    color: #e65100;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .forum-stats-bar {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 480px) {
    .forum-stats-bar {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .forum-stat-card { padding: 14px 12px; }
    .forum-stat-icon { font-size: 22px; width: 40px; height: 40px; }
    .forum-stat-num { font-size: 20px; }
  }
</style>
</body>
</html>
