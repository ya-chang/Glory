<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>版块 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
</head>
<body data-page="forum">

<div id="app-header"></div>

<div class="page-header" id="pageHeader">
  <div class="container">
    <h1 id="catTitle"></h1>
    <p id="catDesc"></p>
  </div>
</div>

<div class="container">
  <div class="breadcrumb" style="padding-top:16px;">
    <a href="forum-home.html">讨论区</a>
    <span class="sep">/</span>
    <span id="breadcrumbCurrent"></span>
  </div>

  <div class="sort-bar">
    <div class="sort-tabs">
      <button class="sort-tab active" data-sort="latest">🕐 最新</button>
      <button class="sort-tab" data-sort="hot">🔥 最热</button>
      <button class="sort-tab" data-sort="top">👍 最多赞</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="tag-filter-wrap" id="tagFilterWrap" style="display:none;">
        <span class="tag-filter-label">标签筛选：</span>
        <span class="tag-filter-tag" id="activeTagFilter"></span>
        <button class="tag-filter-clear" onclick="clearTagFilter()">✕</button>
      </div>
      <div style="font-size:13px;color:var(--text-3);" id="postCount"></div>
    </div>
  </div>

  <div class="available-tags" id="availableTags"></div>

  <div class="post-list" id="postList"></div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div style="font-size:48px;margin-bottom:16px;">📭</div>
    <p>这个版块还没有帖子</p>
    <a href="post-new.html" class="btn btn-primary">发第一帖</a>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<a href="post-new.html" class="btn-new-post" title="发新帖">+</a>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="forum.js?v=2"></script>
<script src="page-forum-category.js"></script>

<style>
  .success-banner {
    background: var(--green-5);
    border: 1px solid var(--green-4);
    border-radius: 8px;
    padding: 12px 20px;
    margin: 16px 0;
    font-size: 14px;
    color: var(--green-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .available-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 8px 0 12px;
  }
  .tag-filter-btn {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-3);
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }
  .tag-filter-btn:hover {
    border-color: var(--blue-4);
    color: var(--blue-3);
    background: var(--blue-5);
  }
  .tag-filter-btn.active {
    background: var(--blue-3);
    color: var(--white);
    border-color: var(--blue-3);
  }

  .tag-filter-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 12px;
    background: var(--blue-5);
    border-radius: 16px;
    font-size: 12px;
  }
  .tag-filter-label { color: var(--text-3); }
  .tag-filter-tag {
    color: var(--blue-3);
    font-weight: 600;
  }
  .tag-filter-clear {
    background: none; border: none;
    color: var(--text-3); cursor: pointer;
    font-size: 14px; line-height: 1;
    padding: 2px;
    transition: color var(--transition);
  }
  .tag-filter-clear:hover { color: #e53935; }

  .post-item.locked { opacity: 0.7; }
  .lock-icon { font-size: 12px; }
  .hot-icon { font-size: 12px; }
  .post-tag.active {
    background: var(--blue-3) !important;
    color: var(--white) !important;
  }
  .post-tag { cursor: pointer; }
  .post-tag:hover { background: var(--blue-4); color: var(--white); }
</style>
</body>
</html>
