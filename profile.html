<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 · 荣耀社区</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="common.css?v=2">
<meta property="og:title" content="个人主页 · 荣耀社区">
<meta property="og:description" content="管理你的荣耀社区个人资料、帖子和 OC 角色">
<meta property="og:image" content="https://ya-chang.github.io/glory/favicon.png">
<meta property="og:type" content="profile">
</head>
<body data-page="profile">

<div id="app-header"></div>

<!-- 个人主页 Hero -->
<div class="profile-hero">
  <div class="container">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">荣</div>
      <div class="profile-info">
        <h1 id="profileName">荣耀玩家</h1>
        <div class="profile-title" id="profileTitle">新手玩家</div>
        <div class="profile-join">📅 加入于 <span id="profileJoinDate">2026-05-01</span></div>
      </div>
      <div class="profile-actions" id="profileActions">
        <a href="settings.html" class="btn btn-secondary" style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:#fff;">⚙️ 编辑资料</a>
        <a href="post-new.html?cat=meta&announce=1" class="btn btn-secondary admin-announce-btn" id="adminAnnounceBtn" style="display:none;background:rgba(106,27,154,0.3);border-color:rgba(106,27,154,0.5);color:#fff;margin-left:8px;">📢 发公告</a>
      </div>
    </div>
  </div>
</div>

<!-- 等级与经验 -->
<div class="profile-level-bar">
  <div class="container">
    <div class="level-info">
      <div class="level-badge" id="levelBadge">Lv.1</div>
      <div class="level-detail">
        <div class="level-name" id="levelName">新手玩家</div>
        <div class="level-progress-wrap">
          <div class="level-progress-bar">
            <div class="level-progress-fill" id="levelProgressFill" style="width:0%"></div>
          </div>
          <div class="level-exp-text"><span id="currentExp">0</span> / <span id="nextLevelExp">100</span> EXP</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="profile-body">
    <!-- 左侧：统计 + 徽章 -->
    <div class="profile-side">
      <!-- 每日签到 -->
      <div class="info-card">
        <h2>📅 每日签到</h2>
        <div class="checkin-card">
          <div class="checkin-status" id="checkinStatus"></div>
          <div class="checkin-stats">
            <div class="checkin-stat">
              <div class="checkin-stat-num" id="checkinStreak">0</div>
              <div class="checkin-stat-label">连续签到</div>
            </div>
            <div class="checkin-stat">
              <div class="checkin-stat-num" id="checkinTotal">0</div>
              <div class="checkin-stat-label">累计签到</div>
            </div>
            <div class="checkin-stat">
              <div class="checkin-stat-num" id="checkinExpEarned">0</div>
              <div class="checkin-stat-label">签到获得EXP</div>
            </div>
          </div>
          <button class="btn btn-primary checkin-btn" id="checkinBtn" onclick="doCheckin()">
            ✅ 签到 +10 EXP
          </button>
          <div class="checkin-calendar" id="checkinCalendar"></div>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="info-card">
        <h2>📊 数据统计</h2>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-num" id="statPosts">0</div>
            <div class="stat-label">帖子</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="statReplies">0</div>
            <div class="stat-label">回复</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="statLikes">0</div>
            <div class="stat-label">获赞</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="statOCs">0</div>
            <div class="stat-label">OC</div>
          </div>
        </div>
      </div>

      <!-- 成就徽章 -->
      <div class="info-card">
        <h2>🏅 成就徽章</h2>
        <div class="badges-grid" id="badgesGrid"></div>
      </div>

      <!-- 等级说明 -->
      <div class="info-card">
        <h2>📈 等级说明</h2>
        <div class="level-table" id="levelTable"></div>
      </div>
    </div>

    <!-- 右侧：内容 -->
    <div class="profile-main">
      <!-- Tab 切换 -->
      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="posts">📝 我的帖子</button>
        <button class="profile-tab" data-tab="ocs">🧑‍🎨 我的 OC</button>
      </div>

      <!-- 我的帖子 -->
      <div class="profile-tab-content active" id="tab-posts">
        <div id="myPosts"><p style="color:var(--text-3);padding:20px 0;text-align:center;">加载中...</p></div>
      </div>

      <!-- 我的 OC -->
      <div class="profile-tab-content" id="tab-ocs">
        <div id="myOCs"><p style="color:var(--text-3);padding:20px 0;text-align:center;">加载中...</p></div>
      </div>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="common.js?v=2"></script>
<script src="layout.js"></script>
<script src="forum.js?v=2"></script>
<script src="oc.js?v=2"></script>
<script src="page-profile.js"></script>

<style>
  .profile-hero {
    background: linear-gradient(135deg, var(--blue-1) 0%, var(--green-2) 100%);
    color: var(--white);
    padding: 40px 24px 48px;
  }
  .profile-header {
    display: flex; align-items: center; gap: 24px;
    max-width: 1200px; margin: 0 auto;
  }
  .profile-avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-info { flex: 1; }
  .profile-info h1 { font-size: 28px; font-weight: 700; }
  .profile-title {
    font-size: 14px; opacity: 0.85;
    margin-top: 4px;
    display: inline-block;
    padding: 2px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
  }
  .profile-join { font-size: 13px; opacity: 0.7; margin-top: 8px; }
  .profile-actions { flex-shrink: 0; }

  .profile-level-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }
  .level-info {
    display: flex; align-items: center; gap: 16px;
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
  }
  .level-badge {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-3), var(--green-3));
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(26,115,232,0.3);
  }
  .level-detail { flex: 1; }
  .level-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .level-progress-wrap { display: flex; align-items: center; gap: 12px; }
  .level-progress-bar {
    flex: 1; height: 10px;
    background: var(--bg); border-radius: 5px; overflow: hidden;
  }
  .level-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-3), var(--green-3));
    border-radius: 5px;
    transition: width 0.6s ease;
  }
  .level-exp-text { font-size: 12px; color: var(--text-3); white-space: nowrap; }

  .profile-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    padding: 24px 0 48px;
  }
  .profile-side { display: flex; flex-direction: column; gap: 20px; }
  .profile-main { min-width: 0; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-item {
    text-align: center;
    padding: 14px 8px;
    background: var(--bg);
    border-radius: 8px;
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--blue-3); line-height: 1.2; }
  .stat-label { font-size: 12px; color: var(--text-3); margin-top: 4px; }

  .badges-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .badge-item {
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .badge-item.unlocked { background: linear-gradient(135deg, #fff8e1, #fff3e0); border-color: #ffe0b2; }
  .badge-item.locked { background: var(--bg); opacity: 0.5; }
  .badge-icon { font-size: 28px; margin-bottom: 6px; }
  .badge-name { font-size: 12px; font-weight: 600; color: var(--text-2); }

  .level-table { font-size: 13px; }
  .level-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
    color: var(--text-3);
  }
  .level-row:last-child { border-bottom: none; }
  .level-row.reached { color: var(--text); }
  .level-row-badge { font-weight: 700; width: 40px; color: var(--blue-3); }
  .level-row.reached .level-row-badge { color: var(--green-2); }
  .level-row-name { flex: 1; }
  .level-row-exp { font-size: 12px; }

  .profile-tabs {
    display: flex; gap: 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
  }
  .profile-tab {
    padding: 10px 20px;
    font-size: 14px; font-weight: 500;
    border: none; background: none;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    font-family: inherit;
  }
  .profile-tab:hover { color: var(--blue-3); }
  .profile-tab.active { color: var(--blue-3); border-bottom-color: var(--blue-3); font-weight: 600; }
  .profile-tab-content { display: none; }
  .profile-tab-content.active { display: block; }

  .checkin-card { text-align: center; }
  .checkin-status { margin-bottom: 12px; }
  .checkin-done { font-size: 13px; color: var(--green-2); font-weight: 600; }
  .checkin-pending { font-size: 13px; color: var(--text-3); }
  .checkin-stats { display: flex; gap: 8px; margin-bottom: 16px; }
  .checkin-stat { flex: 1; padding: 10px 4px; background: var(--bg); border-radius: 8px; }
  .checkin-stat-num { font-size: 20px; font-weight: 700; color: var(--blue-3); line-height: 1.2; }
  .checkin-stat-label { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .checkin-btn {
    width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
    border-radius: 10px; margin-bottom: 16px;
  }
  .checkin-btn.checked { background: var(--green-5); color: var(--green-2); border-color: var(--green-4); cursor: default; opacity: 0.8; }
  .cal-row { display: flex; gap: 6px; justify-content: center; }
  .cal-day {
    flex: 1; max-width: 48px; padding: 8px 0;
    border-radius: 8px; background: var(--bg); text-align: center;
  }
  .cal-day.done { background: var(--green-5); border: 1px solid var(--green-4); }
  .cal-day.today { border: 2px solid var(--blue-3); }
  .cal-day-label { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
  .cal-day-dot { font-size: 13px; font-weight: 700; color: var(--text-3); }
  .cal-day.done .cal-day-dot { color: var(--green-2); }
  .cal-day.today .cal-day-dot { color: var(--blue-3); }

  .toast-msg {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8); color: var(--white);
    padding: 10px 24px; border-radius: 8px;
    font-size: 14px; z-index: 1000; opacity: 0;
    transition: all 0.3s ease; pointer-events: none;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .profile-hero { padding: 28px 16px 36px; }
    .profile-header { flex-direction: column; text-align: center; gap: 16px; }
    .profile-avatar { width: 80px; height: 80px; font-size: 32px; }
    .profile-info h1 { font-size: 22px; }
    .profile-actions { margin-top: 8px; }
    .profile-body { grid-template-columns: 1fr; gap: 16px; }
    .profile-side { order: 2; }
    .profile-main { order: 1; }
    .profile-level-bar { padding: 12px 0; }
    .level-info { padding: 0 16px; }
    .stat-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .stat-item { padding: 10px 4px; }
    .stat-num { font-size: 18px; }
    .badges-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .badge-item { padding: 10px 4px; }
    .badge-icon { font-size: 22px; }
    .badge-name { font-size: 11px; }
    .profile-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .profile-tab { white-space: nowrap; padding: 10px 14px; font-size: 13px; }
    .checkin-stats { gap: 6px; }
    .checkin-stat { padding: 8px 4px; }
    .checkin-stat-num { font-size: 16px; }
  }
  @media (max-width: 480px) {
    .profile-avatar { width: 64px; height: 64px; font-size: 26px; }
    .profile-info h1 { font-size: 18px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .badges-grid { grid-template-columns: repeat(2, 1fr); }
    .checkin-stats { flex-direction: column; gap: 6px; }
    .cal-row { gap: 4px; }
    .cal-day { padding: 6px 0; }
  }
</style>
</body>
</html>
